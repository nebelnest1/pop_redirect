<!doctype html>
<html data-version="0.0.192" data-landing-name="clickbox-simple" data-env="production-archive" js-version="" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
  </style>

  <script>
    var APP_CONFIG = {
      domain: "https://jup9.com",

      mainExit_currentTab_zoneId: 10537803,
      mainExit_newTab_zoneId: 10537802,

      reverse_zoneId: 0,

      back_zoneId: 10537805,
      back_count: 8,

      flow: "direct", // direct
      useBack: false,
      useRealCmeta: true,
      useOsVersion: true,

      // внутренний сплит между currentTab и newTab zone
      splitMainExit: true,
      splitCurrentWeight: 50,
      splitNewTabWeight: 50
    };
  </script>

  <script>
    (async function () {
      "use strict";

      const qp = new URLSearchParams(location.search);

      function getParam(name, fallback = "") {
        const v = qp.get(name);
        return v == null ? fallback : v;
      }

      function getTimezone() {
        try {
          if (typeof Intl !== "undefined" && Intl.DateTimeFormat) {
            return Intl.DateTimeFormat().resolvedOptions().timeZone || "";
          }
        } catch (_) {}
        return "";
      }

      function getTimezoneOffset() {
        try {
          return String(new Date().getTimezoneOffset());
        } catch (_) {
          return "";
        }
      }

      async function getOsVersion() {
        if (!APP_CONFIG.useOsVersion) return "";
        try {
          const ua = navigator.userAgentData;
          if (!ua || typeof ua.getHighEntropyValues !== "function") return "";
          const data = await ua.getHighEntropyValues(["platformVersion"]);
          return data.platformVersion || "";
        } catch (_) {
          return "";
        }
      }

      function buildCmeta() {
        const html = document.documentElement;
        const payload = {
          dataVer: html.getAttribute("data-version") || "",
          landingName: html.getAttribute("data-landing-name") || "",
          templateHash: ""
        };
        return btoa(JSON.stringify(payload));
      }

      async function buildAfuUrl(zoneId) {
        const domain = APP_CONFIG.domain.replace(/\/$/, "");

        const varValue = getParam("var_2") || getParam("var") || getParam("z") || "";
        const ymidValue = getParam("var_1") || getParam("ymid") || getParam("var") || "";
        const var3Value = getParam("var_3") || "";
        const rhdValue = getParam("rhd", "1");
        const campaignId = getParam("campaignid") || "";
        const clickId = getParam("s") || "";
        const creativeId = getParam("creative_id") || "";

        const btz = getTimezone();
        const bto = getTimezoneOffset();
        const cmeta = APP_CONFIG.useRealCmeta ? buildCmeta() : "";
        const osVersion = await getOsVersion();

        const parts = [];

        // порядок ближе к ленду
        if (varValue) parts.push(["var", varValue]);
        parts.push(["rhd", rhdValue]);
        if (osVersion) parts.push(["os_version", osVersion]);
        if (btz) parts.push(["btz", btz]);
        if (bto) parts.push(["bto", bto]);
        if (cmeta) parts.push(["cmeta", cmeta]);
        if (zoneId) parts.push(["zoneid", String(zoneId)]);
        if (varValue) parts.push(["var_2", varValue]);
        if (ymidValue) parts.push(["ymid", ymidValue]);
        if (var3Value) parts.push(["var_3", var3Value]);
        if (campaignId) parts.push(["campaignid", campaignId]);
        if (clickId) parts.push(["click_id", clickId]);
        if (creativeId) parts.push(["creative_id", creativeId]);

        const query = parts
          .map(([k, v]) => encodeURIComponent(k) + "=" + encodeURIComponent(v))
          .join("&");

        return domain + "/afu.php" + (query ? "?" + query : "");
      }

      function pickMainZone() {
        const currentZone = Number(APP_CONFIG.mainExit_currentTab_zoneId || 0);
        const newTabZone = Number(APP_CONFIG.mainExit_newTab_zoneId || 0);

        if (!currentZone) return 0;
        if (!APP_CONFIG.splitMainExit) return currentZone;
        if (!newTabZone) return currentZone;

        const currentWeight = Number(APP_CONFIG.splitCurrentWeight || 0);
        const newTabWeight = Number(APP_CONFIG.splitNewTabWeight || 0);
        const total = currentWeight + newTabWeight;

        if (total <= 0) return currentZone;

        const roll = Math.random() * total;
        return roll < currentWeight ? currentZone : newTabZone;
      }

      const currentZone = pickMainZone();
      if (!currentZone) return;

      const finalUrl = await buildAfuUrl(currentZone);
      const delay = 0;

      setTimeout(() => {
        window.location.href = finalUrl;
      }, delay);
    })();
  </script>
</head>
<body></body>
</html>
