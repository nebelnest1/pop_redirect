<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
  </style>
  <script>
    (async function () {
      "use strict";

      const currentUrl = new URL(window.location.href);
      const sp = currentUrl.searchParams;

      const zoneParam = sp.get("z");
      const domain = sp.get("domain");
      const urlParam = sp.get("url");

      function getTimezone() {
        try {
          if (typeof Intl !== "undefined" && Intl.DateTimeFormat) {
            return Intl.DateTimeFormat().resolvedOptions().timeZone || "";
          }
        } catch (_) {}
        return "";
      }

      function getTimezoneOffset() {
        try {
          return String(new Date().getTimezoneOffset());
        } catch (_) {
          return "";
        }
      }

      async function getOsVersion() {
        try {
          const ua = navigator.userAgentData;
          if (!ua || typeof ua.getHighEntropyValues !== "function") return "";
          const data = await ua.getHighEntropyValues(["platformVersion"]);
          return data.platformVersion || "";
        } catch (_) {
          return "";
        }
      }

      const varValue =
        sp.get("var") ||
        sp.get("var_2") ||
        "";

      const ymidValue =
        sp.get("ymid") ||
        sp.get("var_1") ||
        "";

      const var3Value = sp.get("var_3") || "";
      const rhdValue = sp.get("rhd") || "1";
      const campaignId = sp.get("campaignid") || "";
      const clickId = sp.get("s") || sp.get("click_id") || "";
      const creativeId = sp.get("creative_id") || "";
      const cmetaValue = sp.get("cmeta") || "";

      const btzValue = sp.get("btz") || getTimezone();
      const btoValue = sp.get("bto") || getTimezoneOffset();
      const osVersionValue = sp.get("os_version") || await getOsVersion();

      const finalZoneId = sp.get("zoneid") || zoneParam || "";

      function buildOrderedQuery() {
        const parts = [];

        if (varValue) parts.push(["var", varValue]);
        parts.push(["rhd", rhdValue]);
        if (osVersionValue) parts.push(["os_version", osVersionValue]);
        if (btzValue) parts.push(["btz", btzValue]);
        if (btoValue) parts.push(["bto", btoValue]);
        if (cmetaValue) parts.push(["cmeta", cmetaValue]);
        if (finalZoneId) parts.push(["zoneid", finalZoneId]);
        if (varValue) parts.push(["var_2", varValue]);
        if (ymidValue) parts.push(["ymid", ymidValue]);
        if (var3Value) parts.push(["var_3", var3Value]);
        if (campaignId) parts.push(["campaignid", campaignId]);
        if (clickId) parts.push(["click_id", clickId]);
        if (creativeId) parts.push(["creative_id", creativeId]);

        return parts
          .map(([k, v]) => encodeURIComponent(k) + "=" + encodeURIComponent(v))
          .join("&");
      }

      const query = buildOrderedQuery();

      if (urlParam) {
        const joiner = urlParam.includes("?") ? "&" : "?";
        window.location.replace(urlParam + (query ? joiner + query : ""));
      } else if (zoneParam && domain) {
        const base = domain.replace(/\/$/, "") + "/afu.php";
        window.location.replace(base + (query ? "?" + query : ""));
      } else {
        window.location.replace("https://google.com");
      }
    })();
  </script>
</head>
<body></body>
</html>
